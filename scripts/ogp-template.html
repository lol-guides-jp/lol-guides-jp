<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;width:1200px;height:630px;background:#0a0e14;font-family:'Segoe UI',sans-serif;overflow:hidden;position:relative;">
  <!-- 背景グラデーション -->
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%, rgba(200,155,60,0.15) 0%, transparent 50%),radial-gradient(ellipse at 70% 80%, rgba(46,204,113,0.1) 0%, transparent 50%);"></div>
  <!-- 上部ゴールドライン -->
  <div style="position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#c89b3c,transparent);"></div>
  <!-- 下部ゴールドライン -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#c89b3c,transparent);"></div>
  <!-- 装飾パターン（左） -->
  <div style="position:absolute;left:40px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;opacity:0.3;">
    <div style="width:3px;height:80px;background:linear-gradient(180deg,transparent,#c89b3c,transparent);"></div>
    <div style="width:3px;height:40px;background:linear-gradient(180deg,transparent,#c89b3c,transparent);"></div>
  </div>
  <!-- 装飾パターン（右） -->
  <div style="position:absolute;right:40px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;opacity:0.3;">
    <div style="width:3px;height:80px;background:linear-gradient(180deg,transparent,#c89b3c,transparent);"></div>
    <div style="width:3px;height:40px;background:linear-gradient(180deg,transparent,#c89b3c,transparent);"></div>
  </div>
  <!-- メインコンテンツ -->
  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;">
    <!-- VSアイコン -->
    <div style="width:72px;height:72px;border-radius:16px;background:#141a24;border:2px solid #c89b3c;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 0 30px rgba(200,155,60,0.3);">
      <span style="font-size:32px;font-weight:bold;color:#c89b3c;letter-spacing:2px;">VS</span>
    </div>
    <!-- タイトル -->
    <div style="font-size:64px;font-weight:800;color:#ffffff;letter-spacing:4px;margin-bottom:12px;text-shadow:0 2px 20px rgba(200,155,60,0.3);">LoL マッチアップガイド</div>
    <!-- サブタイトル -->
    <div style="font-size:28px;color:#8895a7;letter-spacing:2px;margin-bottom:36px;">全チャンピオンの対面攻略を日本語で解説</div>
    <!-- ロールタグ -->
    <div style="display:flex;gap:16px;">
      <div style="padding:8px 24px;border-radius:20px;background:#141a24;border:1px solid #2a3545;color:#c89b3c;font-size:18px;font-weight:600;">TOP</div>
      <div style="padding:8px 24px;border-radius:20px;background:#141a24;border:1px solid #2a3545;color:#c89b3c;font-size:18px;font-weight:600;">JG</div>
      <div style="padding:8px 24px;border-radius:20px;background:#141a24;border:1px solid #2a3545;color:#c89b3c;font-size:18px;font-weight:600;">MID</div>
      <div style="padding:8px 24px;border-radius:20px;background:#141a24;border:1px solid #2a3545;color:#c89b3c;font-size:18px;font-weight:600;">ADC</div>
      <div style="padding:8px 24px;border-radius:20px;background:#141a24;border:1px solid #2a3545;color:#c89b3c;font-size:18px;font-weight:600;">SUP</div>
    </div>
    <!-- 統計 -->
    <div style="margin-top:32px;font-size:20px;color:#2ecc71;letter-spacing:1px;">170 Champions ・ 1,360+ Matchups</div>
  </div>
</body></html>
